version: 2
updates:
  # Ruby gem dependencies (gemspec + Gemfile)
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly

  # Root NPM package (the published @profoundry-us/loco_motion package)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly

  # Demo app NPM dependencies
  - package-ecosystem: npm
    directory: "/docs/demo"
    schedule:
      interval: weekly

  # GitHub Actions workflow dependencies
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
